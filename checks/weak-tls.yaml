id: weak-tls-version
info:
  name: Weak TLS Version Detected
  description: Service supports TLS 1.0 or 1.1 which are deprecated and insecure
  severity: high
  category: encryption
  tags: [tls, ssl, encryption, compliance]
  references:
    - https://datatracker.ietf.org/doc/rfc8996/
checks:
  - type: metadata_match
    match:
      tls_version: "TLS 1.0"
  - type: metadata_match
    match:
      tls_version: "TLS 1.1"
remediation: |
  Disable TLS 1.0 and 1.1 on the server. Configure minimum TLS version to 1.2.
  TLS 1.3 is recommended for best security.
